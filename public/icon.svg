<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#141929"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="38%">
      <stop offset="0%" stop-color="rgba(99,102,241,0.18)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <!-- Dark circle background -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Subtle ambient glow -->
  <circle cx="256" cy="240" r="180" fill="url(#glow)"/>

  <!-- Outer focus ring -->
  <circle cx="256" cy="240" r="110" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>

  <!-- Inner focus ring -->
  <circle cx="256" cy="240" r="60" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>

  <!-- Crosshair lines -->
  <line x1="256" y1="118" x2="256" y2="178" stroke="rgba(255,255,255,0.5)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="256" y1="302" x2="256" y2="362" stroke="rgba(255,255,255,0.5)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="134" y1="240" x2="194" y2="240" stroke="rgba(255,255,255,0.5)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="318" y1="240" x2="378" y2="240" stroke="rgba(255,255,255,0.5)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="256" cy="240" r="6" fill="rgba(255,255,255,0.9)"/>

  <!-- FR text -->
  <text x="256" y="432" text-anchor="middle" font-family="Inter,system-ui,-apple-system,sans-serif" font-size="72" font-weight="200" letter-spacing="12" fill="rgba(255,255,255,0.7)">FR</text>
</svg>
